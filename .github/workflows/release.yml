name: Build and Release AmneziaWG Web and Proxy

on:
  push:
    tags:
      - 'v*' # Пайплайн запускается автоматически при пуше тега версии (например, v1.0.1)

jobs:
  build:
    name: Cross-Compile Binary
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Сборка под стандартную архитектуру x86_64 и ARM64 (aarch64)
        target: [x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu]
        include:
          - target: x86_64-unknown-linux-gnu
            arch_name: x64
          - target: aarch64-unknown-linux-gnu
            arch_name: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Необходим для корректной линковки ARM64 бинарников на x86_64 раннере GitHub
      - name: Install cross-compilation linkers (ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      # -------------------------------------------------------------------------
      # СБОРКА КОМПОНЕНТОВ
      # -------------------------------------------------------------------------
      
      # Сборка Веб-панели
      - name: Build Release Binary (Web Panel)
        working-directory: amneziawg-web
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          fi
          cargo build --release --target ${{ matrix.target }}

      # Сборка Прокси-слоя (Новый шаг)
      - name: Build Release Binary (Proxy Layer)
        working-directory: amneziawg-proxy
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          fi
          cargo build --release --target ${{ matrix.target }}

      # -------------------------------------------------------------------------
      # ПОДГОТОВКА И СТРУКТУРИРОВАНИЕ АРТИФАКТОВ
      # -------------------------------------------------------------------------
      - name: Rename and structure artifacts for upload
        run: |
          mkdir -p dist
          # Копируем панель
          cp amneziawg-web/target/${{ matrix.target }}/release/amneziawg-web dist/amneziawg-web-${{ matrix.arch_name }}
          # Копируем прокси (Новый шаг)
          cp amneziawg-proxy/target/${{ matrix.target }}/release/amneziawg-proxy dist/amneziawg-proxy-${{ matrix.arch_name }}

      # -------------------------------------------------------------------------
      # ПУБЛИКАЦИЯ В RELEASE ASSETS
      # -------------------------------------------------------------------------
      - name: Upload Artifacts to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/amneziawg-web-${{ matrix.arch_name }}
            dist/amneziawg-proxy-${{ matrix.arch_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
